id: prefer-lib-import-format
valid:
  - 'lib.importJSON ./foo.json'
  - 'lib.importTOML ./foo.toml'
  - 'builtins.fromJSON jsonString'
  - 'builtins.fromTOML tomlString'
invalid:
  - 'builtins.fromJSON (builtins.readFile ./foo.json)'
  - 'fromJSON (readFile ./foo.json)'
  - 'builtins.fromJSON (readFile ./foo.json)'
  - 'fromJSON (builtins.readFile ./foo.json)'
  - 'builtins.fromTOML (builtins.readFile ./foo.toml)'
  - 'fromTOML (readFile ./foo.toml)'
