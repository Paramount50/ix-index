id: prefer-genattrs-listtoattrs
valid:
  - 'lib.genAttrs xs f'
  - 'lib.genAttrs'' xs mkEntry'
  - 'listToAttrs entries'
  - 'listToAttrs (filter pred xs)'
invalid:
  - 'listToAttrs (map (n: { name = n; value = f n; }) xs)'
  - 'lib.listToAttrs (map (n: { name = n; value = f n; }) xs)'
  - 'builtins.listToAttrs (map (n: { name = n; value = f n; }) xs)'
  - 'listToAttrs (map packageSource packages)'
  - 'lib.listToAttrs (map mkEntry xs)'
  - 'listToAttrs (map (x: lib.nameValuePair x.k x.v) xs)'
