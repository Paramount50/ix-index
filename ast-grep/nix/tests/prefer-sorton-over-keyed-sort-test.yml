id: prefer-sorton-over-keyed-sort
valid:
  - 'lib.sortOn (x: x.priority) entries'
  - 'lib.sort (a: b: a < b) xs'
  - 'lib.sort (a: b: a.x < b.y) xs'
  - 'lib.sort (a: b: f a < g b) xs'
  - 'lib.sort (a: b: a.priority > b.priority) xs'
invalid:
  - 'lib.sort (left: right: left.priority < right.priority) entries'
  - 'builtins.sort (m: n: m.k < n.k) zs'
  - 'sort (p: q: p.name < q.name) ys'
  - 'builtins.sort (x: y: f x < f y) xs'
  - 'sort (a: b: g a < g b) ws'
  - 'lib.sort (a: b: (f a) < (f b)) xs'
