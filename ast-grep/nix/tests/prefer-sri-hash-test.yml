id: prefer-sri-hash
valid:
  - '{ hash = "sha256-AAAA"; }'
  - '{ cargoHash = "sha256-AAAA"; }'
  - '{ vendorHash = "sha256-AAAA"; }'
  - '{ npmDepsHash = "sha256-AAAA"; }'
invalid:
  - '{ sha256 = "sha256-AAAA"; }'
  - '{ sha256 = checksum; }'
  - '{ cargoSha256 = "sha256-AAAA"; }'
  - '{ vendorSha256 = "sha256-AAAA"; }'
  - '{ npmDepsSha256 = "sha256-AAAA"; }'
  - '{ modSha256 = "sha256-AAAA"; }'
