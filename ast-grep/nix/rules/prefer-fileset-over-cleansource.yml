id: prefer-fileset-over-cleansource
language: nix
severity: warning
message: "`lib.cleanSource` is a blunt filter. Prefer `lib.fileset.toSource { root; fileset = ...; }` so the source closure names exactly what the build needs."
note: |
  WHY: `lib.cleanSource` strips well-known junk (`.git`, `*.o`, editor backups)
  but still includes the entire tree under the directory you point it at. That
  means an unrelated edit to docs or examples invalidates every downstream
  derivation. `lib.fileset` (since nixpkgs 23.11) lets you compose the source
  set explicitly with `unions`, `difference`, `intersection`, and `fileFilter`.
  NIXPKGS: nix.dev tutorial, Tweag blog 2023-11-28. `lib.cleanSourceWith` is the
  closest legacy comparable and has the same downside.
  REPO: Use `lib.fileset.toSource { root = ./.; fileset = lib.fileset.unions [ ... ]; }`.
rule:
  # Match the `lib.`-qualified spellings and the bare names brought in via
  # `inherit (lib) cleanSource;` / `inherit (lib.sources) cleanSourceWith;`.
  any:
    - pattern: lib.cleanSource $X
    - pattern: cleanSource $X
    - pattern: lib.sources.cleanSourceWith $X
    - pattern: lib.cleanSourceWith $X
    - pattern: cleanSourceWith $X
