id: prefer-genlist-over-map-range
language: nix
severity: warning
message: "`map f (lib.range 0 (n - 1))` collapses to `lib.genList f n`."
note: |
  WHY: `lib.genList f n` produces `[ (f 0) (f 1) ... (f (n-1)) ]` directly.
  Building the index list with `lib.range` and then mapping over it is a
  hand-rolled equivalent that obscures the intent.
  REPO: Use `lib.genList f n` directly.
rule:
  # Match `lib.range` and the bare name brought in via `inherit (lib) range`.
  any:
    - pattern: map $F (lib.range 0 ($N - 1))
    - pattern: map $F (range 0 ($N - 1))
