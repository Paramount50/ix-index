id: no-negate-bool-literal
language: nix
severity: warning
message: "`!true` / `!false` is the opposite literal. Use the literal directly."
note: |
  WHY: A negated boolean literal is a refactor leftover or a typo. statix does
  not catch this; nix-linter has the `NegateAtom` rule.
  REPO: Write `false` instead of `!true`, and `true` instead of `!false`.
rule:
  any:
    - pattern: '!true'
    - pattern: '!false'
