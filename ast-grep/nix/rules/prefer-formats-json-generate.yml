id: prefer-formats-json-generate
language: nix
severity: warning
message: "Use `(pkgs.formats.json { }).generate \"name\" value` instead of `pkgs.writeText \"name\" (builtins.toJSON value)`."
note: |
  WHY: `pkgs.formats.json` (and the matching `yaml`, `toml`, `ini`, `gitIni`) give
  a typed `generate` helper, the matching `.type` for module options, and stable
  serialization for nested attrsets. Hand-rolling `writeText + toJSON` skips that
  whole API. The `.type` is the actual unlock — once you use the generator, the
  same format provides a submodule type that produces typed merging and rendered
  docs.
  NIXPKGS: nixpkgs services modules (~430 call sites) use `pkgs.formats.*`.
  Home-manager mirrors this. See nixpkgs `pkgs/pkgs-lib/formats/`.
  REPO: Switch to the format generator. If the call site is part of a build that
  cannot evaluate `pkgs.formats` (rare), document the reason inline.
rule:
  # Match both the `pkgs.`-qualified and bare `writeText` spelling, and the
  # `builtins.toJSON` / inherited `toJSON` spelling.
  any:
    - pattern: pkgs.writeText $NAME (builtins.toJSON $VAL)
    - pattern: pkgs.writeText $NAME (toJSON $VAL)
    - pattern: writeText $NAME (builtins.toJSON $VAL)
    - pattern: writeText $NAME (toJSON $VAL)
