id: no-throw-without-message
language: nix
severity: warning
message: "`throw \"\"` is an empty placeholder message. Pass a message that names the failing invariant."
note: |
  WHY: An empty `throw ""` produces a trace that names a file and a column but
  not the actual problem. Match the spirit of `no-bare-assert`: name the
  invariant. This rule catches only the empty-string literal; a `throw` whose
  message is a variable holding an opaque value is not statically detectable.
  REPO: Write `throw "ix.<area>: <what failed> (<value>)"` so the trace points at
  the owner.
rule:
  any:
    - pattern: throw ""
    - pattern: builtins.throw ""
