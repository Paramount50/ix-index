id: no-update-empty-set
language: nix
severity: warning
message: "`X // { }` and `{ } // X` are no-ops. Drop the empty operand."
note: |
  WHY: Attrset update with an empty operand on either side is the identity. The
  pattern usually points at a refactor where one branch was emptied; the read is
  noisier than the equivalent `X`.
  NIXPKGS: nix-linter `UpdateEmptySet`; nixpkgs-hammering does not enforce.
  REPO: Drop the `// { }` half. If the empty side was a conditional, use
  `lib.optionalAttrs cond { ... }` (the `//` operator already gives identity when
  the helper returns `{ }`).
rule:
  any:
    - pattern: '$X // { }'
    - pattern: '{ } // $X'
