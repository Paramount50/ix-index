id: prefer-genattrs-listtoattrs
language: nix
severity: warning
message: "`listToAttrs (map f xs)` is `lib.genAttrs' xs f`. When each entry is keyed by the element itself (`map (n: { name = n; value = v; }) xs`), it simplifies further to `lib.genAttrs xs f`."
note: |
  WHY: `listToAttrs` consumes a list of `{ name; value; }` pairs, so
  `listToAttrs (map f xs)` always means "turn each element of `xs` into one
  attrset entry with `f`". `lib.genAttrs'` is the named idiom for that and drops
  the intermediate list from the call site. The element-keyed special case,
  where the name is the element and only the value is computed, is the even more
  direct `lib.genAttrs`.
  NIXPKGS: `lib.genAttrs` (forAllSystems and friends) and `lib.genAttrs'` are
  both used widely.
  REPO:
    * key derived from the element, or the function is named:
      `listToAttrs (map f xs)` -> `lib.genAttrs' xs f`
    * key IS the element (`{ name = n; value = v; }`):
      `listToAttrs (map (n: { name = n; value = v; }) xs)` -> `lib.genAttrs xs (n: v)`
rule:
  # The general `map $F $XS` shape already covers the element-keyed lambda, so a
  # single set of patterns matches both rewrites; the message tells them apart.
  any:
    - pattern: "lib.listToAttrs (map $F $XS)"
    - pattern: "listToAttrs (map $F $XS)"
    - pattern: "builtins.listToAttrs (map $F $XS)"
