id: no-tofile-unsafediscardstringcontext
language: nix
severity: error
message: "`builtins.toFile X (builtins.unsafeDiscardStringContext Y)` drops the runtime dependency. Use `pkgs.writeText X Y` (or `passAsFile`) instead — interpolation preserves store-path context."
note: |
  WHY: `builtins.toFile` requires a string with no store-path context. Pairing it
  with `unsafeDiscardStringContext` is the common workaround when the value
  contains derivations — but doing so silently drops the runtime dependency on
  those derivations. The resulting file ends up in the store, but the closure
  does not include the things it references, so the build is fine and runtime
  breaks. `pkgs.writeText` is the typed alternative.
  NIXPKGS: Nix tracking issue #485682. `unsafeDiscardStringContext` is the
  in-band marker for "I really mean to lie about the dependency graph."
  REPO: Use `pkgs.writeText name content` (or `writeTextFile` for richer needs).
rule:
  any:
    - pattern: builtins.toFile $N (builtins.unsafeDiscardStringContext $V)
    - pattern: builtins.toFile $N (unsafeDiscardStringContext $V)
    - pattern: toFile $N (builtins.unsafeDiscardStringContext $V)
    - pattern: toFile $N (unsafeDiscardStringContext $V)
