[package]
name = "mirror"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Generate and sync standalone read-only GitHub mirror repos for opt-in workspace packages"

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive"] }
# Fork mappings (lib/fork-packages.nix rendered by `nix eval --json`) and
# flake.lock are consumed as plain JSON, so no nix evaluation happens here.
serde_json.workspace = true
tempfile.workspace = true
toml_edit.workspace = true
