[package]
name = "search"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "CLI for content-addressed semantic code search (thin wrapper over search-core)"

[lints]
workspace = true

[[bin]]
name = "search"
path = "src/main.rs"

[dependencies]
anstream.workspace = true
anstyle.workspace = true
anyhow.workspace = true
source-claude.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
code-highlight.workspace = true
dirs.workspace = true
indicatif.workspace = true
source-linear.workspace = true
mixedbread.workspace = true
progress-style.workspace = true
search-core.workspace = true
source-slack.workspace = true
terminal-theme.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
