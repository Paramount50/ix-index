[package]
name = "minecraft-nbt-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

# Own workspace so the libfuzzer-sys sysroot rebuild stays off the main
# `cargo --workspace` graph and `nix flake check` does not see the fuzz crate.
[workspace]

# The crate under fuzz, declared once here and inherited below with
# `minecraft-nbt.workspace = true` (no-cargo-path-dep forbids the path in the
# member [dependencies] table).
[workspace.dependencies]
minecraft-nbt = { path = ".." }

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"
minecraft-nbt.workspace = true

[[bin]]
name = "decode_document"
path = "fuzz_targets/decode_document.rs"
test = false
doc = false
bench = false
