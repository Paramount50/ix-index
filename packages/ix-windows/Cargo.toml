[package]
name = "ix-windows"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Render each live MCP resource as its own borderless native webview window, driven by the dashboard producer stream"

[lints]
workspace = true

[[bin]]
name = "ix-windows"
path = "src/main.rs"

[lib]
name = "ix_windows"
path = "src/lib.rs"

[dependencies]
clap = { workspace = true, features = ["derive"] }
dashboard-core.workspace = true
serde_json.workspace = true
tao.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "net", "io-util", "time"] }
wry.workspace = true

# Native macOS window tuning via objc2: WebKit's private 120Hz experimental-
# feature API and the `canBecomeKey`/`canBecomeMain` overrides that let a
# borderless window tile under aerospace. Versions tracked to wry's own objc2
# graph.
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = { workspace = true }
objc2-foundation = { workspace = true }
objc2-web-kit = { workspace = true }
