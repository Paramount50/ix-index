[package]
name = "tui"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "PTY-backed terminal UI management library for spawning and controlling multiple TUI processes"

[lints]
workspace = true

[features]
pyo3 = ["dep:pyo3"]
# Expose this process's terminals over a unix socket as NDJSON pane snapshots,
# for an out-of-process aggregator to render. Off by default and HTTP/CRDT-free
# so a process that only publishes stays lightweight. Pulls `dashboard-core`,
# which owns the wire types, the socket, and the serialization; this crate only
# adapts a live manager into terminal panes.
publish = ["dep:dashboard-core", "tokio/net"]
# A read-only web dashboard that streams every live terminal to the browser as
# a Loro CRDT document over SSE. Off by default so the core PTY library stays
# free of the HTTP and CRDT closure. The browser-facing server and the wire
# types live in `dashboard-core`; this feature pulls that crate and drives it
# from a live manager.
dashboard = ["dep:dashboard-core", "tokio/net"]

[dependencies]
ix-vt = { path = "../vt/ix-vt" }
ndarray.workspace = true
parking_lot.workspace = true
pty-process.workspace = true
pyo3 = { workspace = true, optional = true }
snafu.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "process", "io-util", "time"] }
dashboard-core = { workspace = true, optional = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
# Drive the publish/aggregate integration test, which connects to a producer
# socket and parses its NDJSON stream like the aggregator does.
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util", "time"] }
