<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 215" role="img"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    svg { color: #1f2328; }
    .muted { fill: #656d76; }
    .accent { stroke: #8250df; }
    text { fill: currentColor; }
    .box { stroke: currentColor; fill: none; }
    .edge { stroke: currentColor; fill: none; marker-end: url(#arrow); }
    @media (prefers-color-scheme: dark) {
      svg { color: #e6edf3; }
      .muted { fill: #8b949e; }
      .accent { stroke: #a371f7; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect class="box" x="20" y="45" width="175" height="66" rx="8"/>
  <text x="107" y="73" text-anchor="middle" font-size="15" font-weight="600">your coroutine</text>
  <text x="107" y="93" text-anchor="middle" font-size="11" class="muted">asyncio, plain gather</text>

  <line class="edge" x1="195" y1="78" x2="283" y2="78"/>
  <text x="239" y="68" text-anchor="middle" font-size="12" class="muted">await send, enter</text>

  <rect class="box" x="285" y="45" width="165" height="66" rx="8"/>
  <text x="367" y="73" text-anchor="middle" font-size="15" font-weight="600">Tui (Rust)</text>
  <text x="367" y="93" text-anchor="middle" font-size="11" class="muted">tokio PTY + vt100</text>

  <line class="edge" x1="450" y1="78" x2="538" y2="78"/>
  <text x="494" y="68" text-anchor="middle" font-size="12" class="muted">wait_for, snapshot</text>

  <rect class="box" x="540" y="45" width="160" height="66" rx="8"/>
  <text x="620" y="73" text-anchor="middle" font-size="15" font-weight="600">Snapshot</text>
  <text x="620" y="93" text-anchor="middle" font-size="11" class="muted">text, styles, numpy</text>

  <line class="edge" x1="367" y1="111" x2="367" y2="155"/>
  <text x="392" y="138" font-size="12" class="muted">serve()</text>

  <rect class="box accent" x="282" y="157" width="170" height="44" rx="8"/>
  <text x="367" y="176" text-anchor="middle" font-size="13" font-weight="600">web dashboard</text>
  <text x="367" y="192" text-anchor="middle" font-size="11" class="muted">live grid of every Tui</text>
</svg>
