<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    svg { color: #1f2328; }
    .muted { fill: #656d76; }
    .accent { stroke: #8250df; }
    text { fill: currentColor; }
    .box { stroke: currentColor; fill: none; }
    .edge { stroke: currentColor; fill: none; marker-end: url(#arrow); }
    @media (prefers-color-scheme: dark) {
      svg { color: #e6edf3; }
      .muted { fill: #8b949e; }
      .accent { stroke: #a371f7; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect class="box" x="20" y="75" width="170" height="66" rx="8"/>
  <text x="105" y="103" text-anchor="middle" font-size="15" font-weight="600">command</text>
  <text x="105" y="123" text-anchor="middle" font-size="11" class="muted">50,000 lines of output</text>

  <line class="edge" x1="190" y1="108" x2="288" y2="108"/>
  <text x="239" y="98" text-anchor="middle" font-size="12" class="muted">run &lt;cmd&gt;</text>

  <rect class="box" x="290" y="75" width="160" height="66" rx="8"/>
  <text x="370" y="103" text-anchor="middle" font-size="15" font-weight="600">recorded PTY</text>
  <text x="370" y="123" text-anchor="middle" font-size="11" class="muted">live, replayable</text>

  <line class="edge" x1="450" y1="90" x2="533" y2="55"/>
  <text x="488" y="58" text-anchor="middle" font-size="12" class="muted">prints</text>

  <rect class="box accent" x="535" y="22" width="165" height="60" rx="8"/>
  <text x="617" y="47" text-anchor="middle" font-size="14" font-weight="600">your console</text>
  <text x="617" y="66" text-anchor="middle" font-size="11" class="muted">first 80 + last 80 lines</text>

  <line class="edge" x1="450" y1="126" x2="533" y2="160"/>
  <text x="484" y="158" text-anchor="middle" font-size="12" class="muted">writes</text>

  <rect class="box" x="535" y="130" width="165" height="70" rx="8"/>
  <text x="617" y="152" text-anchor="middle" font-size="13" font-weight="600">.ix/run/&lt;session&gt;/</text>
  <text x="617" y="170" text-anchor="middle" font-size="10" class="muted">output.log, session.cast</text>
  <text x="617" y="186" text-anchor="middle" font-size="10" class="muted">lines.jsonl, summary.json</text>
</svg>
