<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 190" role="img"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    svg { color: #1f2328; }
    .muted { fill: #656d76; }
    .accent { stroke: #8250df; }
    text { fill: currentColor; }
    .box { stroke: currentColor; fill: none; }
    .edge { stroke: currentColor; fill: none; marker-end: url(#arrow); }
    @media (prefers-color-scheme: dark) {
      svg { color: #e6edf3; }
      .muted { fill: #8b949e; }
      .accent { stroke: #a371f7; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect class="box" x="20" y="60" width="170" height="66" rx="8"/>
  <text x="105" y="88" text-anchor="middle" font-size="15" font-weight="600">Node / Bun</text>
  <text x="105" y="108" text-anchor="middle" font-size="11" class="muted">new Tui("vim"), await</text>

  <line class="edge" x1="190" y1="93" x2="278" y2="93"/>
  <text x="234" y="83" text-anchor="middle" font-size="12" class="muted">N-API promises</text>

  <rect class="box" x="280" y="60" width="165" height="66" rx="8"/>
  <text x="362" y="88" text-anchor="middle" font-size="15" font-weight="600">tui crate (Rust)</text>
  <text x="362" y="108" text-anchor="middle" font-size="11" class="muted">real PTY + vt100</text>

  <line class="edge" x1="445" y1="93" x2="533" y2="93"/>
  <text x="489" y="83" text-anchor="middle" font-size="12" class="muted">serve() streams</text>

  <rect class="box accent" x="535" y="60" width="165" height="66" rx="8"/>
  <text x="617" y="88" text-anchor="middle" font-size="15" font-weight="600">browser grid</text>
  <text x="617" y="108" text-anchor="middle" font-size="11" class="muted">Loro CRDT over SSE</text>
</svg>
