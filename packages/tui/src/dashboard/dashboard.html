<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tui</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #08090b;
    --panel: #0c0d10;
    --panel-edge: #1b1d22;
    --panel-edge-hover: #2b2e36;
    --ink: #e7e9ee;
    --ink-dim: #6b7078;
    --ink-faint: #41454d;
    --live: #4ade80;
    --dead: #f4636b;
    --ui: ui-sans-serif, system-ui, -apple-system, "SF Pro Text", Segoe UI, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    padding: 28px clamp(20px, 4vw, 56px) 56px;
    background:
      radial-gradient(1200px 600px at 50% -10%, #101218 0%, transparent 60%),
      var(--bg);
    color: var(--ink);
    font: 13px/1.5 var(--ui);
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; align-items: center; gap: 14px;
    margin: 0 2px 24px;
  }
  header .mark {
    font-family: var(--mono); font-weight: 600; font-size: 14px;
    letter-spacing: 0.5px; color: var(--ink);
  }
  header .mark .accent { color: var(--ink-dim); }
  header .spacer { flex: 1; }
  header .stat {
    color: var(--ink-dim); font-variant-numeric: tabular-nums;
    font-size: 12px; letter-spacing: 0.2px;
  }
  header .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ink-faint); transition: background 0.3s, box-shadow 0.3s;
  }
  header .dot.live {
    background: var(--live);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--live) 18%, transparent);
  }

  #grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    align-items: start;
  }

  .term {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.02) inset,
      0 12px 30px -18px rgba(0,0,0,0.9);
    transition: border-color 0.2s;
  }
  /* Border color reacts to hover; the up/down motion was removed deliberately. */
  .term:hover { border-color: var(--panel-edge-hover); }
  .term.dead { opacity: 0.5; }

  .term .head {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--panel-edge);
  }
  .term .led {
    flex: none; width: 8px; height: 8px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--live) 16%, transparent);
  }
  .term.dead .led { background: var(--dead); box-shadow: none; }
  .term .cmd {
    font-family: var(--mono); font-size: 12.5px; font-weight: 500;
    color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .term .spacer { flex: 1; }
  .term .chip {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.3px;
    color: var(--ink-faint);
  }
  .term .size {
    font-family: var(--mono); font-size: 11px; color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }

  .term pre {
    margin: 0; padding: 14px 16px;
    font-family: var(--mono); font-size: 12px; line-height: 1.38;
    color: var(--ink);
    white-space: pre; overflow: auto;
    /* A stable floor so an empty or one-line screen does not collapse the card. */
    min-height: 3.6em;
    max-height: 60vh; tab-size: 8;
    scrollbar-width: thin; scrollbar-color: var(--panel-edge-hover) transparent;
  }
  .term pre::-webkit-scrollbar { width: 9px; height: 9px; }
  .term pre::-webkit-scrollbar-thumb {
    background: var(--panel-edge-hover); border-radius: 9px;
    border: 2px solid var(--panel);
  }
  /* Style attributes carried by the SGR runs. */
  .term pre .b { font-weight: 700; }
  .term pre .i { font-style: italic; }
  .term pre .u { text-decoration: underline; }

  /* Cursor overlays. Inline so the cell text stays selectable underneath. */
  .term pre .cur { position: relative; }
  .term pre .cur::after {
    content: ""; position: absolute; pointer-events: none;
    left: 0; top: 0; right: 0; bottom: 0;
  }
  .term pre .cur.block::after { background: var(--ink); mix-blend-mode: difference; }
  .term pre .cur.hollow::after { box-shadow: inset 0 0 0 1px var(--ink); }
  .term pre .cur.bar::after { right: auto; width: 1px; background: var(--ink); }
  .term pre .cur.underline::after { top: auto; height: 1px; background: var(--ink); }

  .placeholder {
    color: var(--ink-faint); font-style: italic;
  }

  .empty {
    grid-column: 1 / -1;
    color: var(--ink-dim); text-align: center;
    padding: 12vh 0; font-family: var(--mono); font-size: 13px;
  }
  .empty .hint { color: var(--ink-faint); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<header>
  <span class="mark">tui<span class="accent">·dashboard</span></span>
  <span class="dot" id="dot"></span>
  <span class="spacer"></span>
  <span class="stat" id="stat">connecting</span>
</header>
<div id="grid"><div class="empty">connecting…</div></div>
<script type="module">
import { LoroDoc } from "https://esm.sh/loro-crdt@1";

const SCOPE_SEP = String.fromCharCode(0x1f); // matches dashboard::hub::SCOPE_SEP
const doc = new LoroDoc();
const grid = document.getElementById("grid");
const stat = document.getElementById("stat");
const dot = document.getElementById("dot");

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

// ----- color -------------------------------------------------------------- //

// The 256-color palette: 16 base ANSI, a 6x6x6 cube, then a 24-step gray ramp.
// Matches the standard xterm layout the tui crate's SGR encoder targets.
const PALETTE = (() => {
  const base = [
    [0, 0, 0], [205, 0, 0], [0, 205, 0], [205, 205, 0],
    [0, 0, 238], [205, 0, 205], [0, 205, 205], [229, 229, 229],
    [127, 127, 127], [255, 0, 0], [0, 255, 0], [255, 255, 0],
    [92, 92, 255], [255, 0, 255], [0, 255, 255], [255, 255, 255],
  ];
  const table = base.slice();
  const cube = [0, 95, 135, 175, 215, 255];
  for (let r = 0; r < 6; r++)
    for (let g = 0; g < 6; g++)
      for (let b = 0; b < 6; b++) table.push([cube[r], cube[g], cube[b]]);
  for (let i = 0; i < 24; i++) {
    const v = 8 + i * 10;
    table.push([v, v, v]);
  }
  return table;
})();

// Resolve an SGR color descriptor to a CSS color, or null for the terminal
// default (which inherits the panel ink / background).
function cssColor(c) {
  if (!c) return null;
  if (c.kind === "idx") {
    const rgb = PALETTE[c.value] ?? [0, 0, 0];
    return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
  }
  if (c.kind === "rgb") return `rgb(${c.r},${c.g},${c.b})`;
  return null;
}

// ----- SGR parsing -------------------------------------------------------- //

// A fresh, all-default style. The encoder resets per row, so each row starts
// here regardless of the previous row.
function freshStyle() {
  return { fg: null, bg: null, bold: false, italic: false, underline: false, inverse: false };
}

// Apply one SGR escape's numeric params to `style` in place. Mirrors the codes
// the tui crate emits: 0 reset, 1/3/4/7 attributes, 30-37/90-97 + 38;5/38;2 fg,
// 40-47/100-107 + 48;5/48;2 bg.
function applySgr(style, params) {
  for (let i = 0; i < params.length; i++) {
    const p = params[i];
    if (p === 0) Object.assign(style, freshStyle());
    else if (p === 1) style.bold = true;
    else if (p === 3) style.italic = true;
    else if (p === 4) style.underline = true;
    else if (p === 7) style.inverse = true;
    else if (p === 22) style.bold = false;
    else if (p === 23) style.italic = false;
    else if (p === 24) style.underline = false;
    else if (p === 27) style.inverse = false;
    else if (p >= 30 && p <= 37) style.fg = { kind: "idx", value: p - 30 };
    else if (p === 39) style.fg = null;
    else if (p >= 40 && p <= 47) style.bg = { kind: "idx", value: p - 40 };
    else if (p === 49) style.bg = null;
    else if (p >= 90 && p <= 97) style.fg = { kind: "idx", value: p - 90 + 8 };
    else if (p >= 100 && p <= 107) style.bg = { kind: "idx", value: p - 100 + 8 };
    else if (p === 38 || p === 48) {
      const target = p === 38 ? "fg" : "bg";
      if (params[i + 1] === 5) { style[target] = { kind: "idx", value: params[i + 2] }; i += 2; }
      else if (params[i + 1] === 2) {
        style[target] = { kind: "rgb", r: params[i + 2], g: params[i + 3], b: params[i + 4] };
        i += 4;
      }
    }
  }
}

// Split one SGR-coded row into runs of `{ text, style }`. A run is a maximal
// span of cells sharing one style; the escape sequences themselves are consumed.
function parseRow(line) {
  const runs = [];
  const style = freshStyle();
  let text = "";
  let i = 0;
  while (i < line.length) {
    const esc = line.indexOf("\x1b[", i);
    if (esc === -1) { text += line.slice(i); break; }
    text += line.slice(i, esc);
    const end = line.indexOf("m", esc);
    if (end === -1) { text += line.slice(esc); break; }
    if (text) { runs.push({ text, style: { ...style } }); text = ""; }
    const body = line.slice(esc + 2, end);
    const params = body === "" ? [0] : body.split(";").map((s) => parseInt(s, 10) || 0);
    applySgr(style, params);
    i = end + 1;
  }
  if (text) runs.push({ text, style: { ...style } });
  return runs;
}

// ----- screen rendering --------------------------------------------------- //

// Style two colors into a span's CSS, honoring inverse video by swapping fg/bg.
function applyStyleCss(span, style) {
  let fg = cssColor(style.fg);
  let bg = cssColor(style.bg);
  if (style.inverse) {
    const ink = "var(--ink)";
    const panel = "var(--panel)";
    [fg, bg] = [bg ?? panel, fg ?? ink];
  }
  if (fg) span.style.color = fg;
  if (bg) span.style.background = bg;
  let cls = "";
  if (style.bold) cls += " b";
  if (style.italic) cls += " i";
  if (style.underline) cls += " u";
  if (cls) span.className = cls.trim();
}

// Build the styled-and-cursored <pre> children for one screen.
//
// `cursor` is `{ row, col, shape }` to draw, or null. The cursor cell is split
// out of its run so its overlay class lands on exactly one character; a cursor
// past the row end gets a synthetic space so it still shows.
function renderScreen(pre, screen, cursor) {
  const lines = screen.split("\n");
  lines.forEach((line, row) => {
    if (row > 0) pre.append(document.createTextNode("\n"));
    const runs = parseRow(line);
    const cursorCol = cursor && cursor.row === row ? cursor.col : -1;
    let col = 0;
    for (const run of runs) {
      // Emit the run, splitting at the cursor column when it falls inside.
      let start = 0;
      for (let k = 0; k < run.text.length; k++) {
        if (col + k === cursorCol) {
          if (k > start) pre.append(styledSpan(run.text.slice(start, k), run.style));
          pre.append(cursorSpan(run.text[k], run.style, cursor.shape));
          start = k + 1;
        }
      }
      if (start < run.text.length) pre.append(styledSpan(run.text.slice(start), run.style));
      col += run.text.length;
    }
    // The cursor sits at or past the row's last cell. The encoder trims the
    // blank tail, so pad to the cursor column before drawing it; otherwise a
    // cursor at column 10 on a 2-char row would render right after the text.
    if (cursorCol >= col) {
      if (cursorCol > col) pre.append(document.createTextNode(" ".repeat(cursorCol - col)));
      pre.append(cursorSpan(" ", freshStyle(), cursor.shape));
    }
  });
}

function styledSpan(text, style) {
  const span = document.createElement("span");
  span.textContent = text;
  applyStyleCss(span, style);
  return span;
}

function cursorSpan(ch, style, shape) {
  const span = styledSpan(ch || " ", style);
  // hollow outline for a block on a (typically background) terminal reads
  // better than a filled block; "block" maps to the inverse-fill overlay.
  const kind = shape === "bar" ? "bar" : shape === "underline" ? "underline" : "block";
  span.classList.add("cur", kind);
  return span;
}

function render() {
  const terminals = doc.toJSON().terminals ?? {};
  const keys = Object.keys(terminals).sort();

  if (keys.length === 0) {
    grid.innerHTML =
      '<div class="empty">no terminals yet'
      + '<div class="hint">spawn a <code>tui.Tui(...)</code>; it shows up here automatically</div></div>';
    return;
  }

  const producers = new Set();
  grid.innerHTML = "";
  for (const key of keys) {
    const t = terminals[key];
    const sep = key.indexOf(SCOPE_SEP);
    const scope = sep === -1 ? "" : key.slice(0, sep);
    producers.add(scope);
    const alive = t.alive !== false;

    const term = document.createElement("div");
    term.className = alive ? "term" : "term dead";

    const head = document.createElement("div");
    head.className = "head";

    const led = document.createElement("span");
    led.className = "led";
    led.title = alive ? "running" : "exited";

    const cmd = document.createElement("span");
    cmd.className = "cmd";
    cmd.textContent = [t.command, t.args].filter(Boolean).join(" ") || "(terminal)";

    const spacer = document.createElement("span");
    spacer.className = "spacer";

    head.append(led, cmd, spacer);

    if (scope && scope !== "local") {
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = scope;
      chip.title = "producer " + scope;
      head.append(chip);
    }

    const size = document.createElement("span");
    size.className = "size";
    size.textContent = `${t.rows}×${t.cols}`;
    head.append(size);

    const pre = document.createElement("pre");
    const screen = t.screen ?? "";
    // A frame has output if it has visible text once SGR is stripped, or any
    // SGR run at all: a styled-whitespace screen (a colored progress bar, a
    // selection drawn with background cells) carries no plain text but is not
    // empty, and the encoder only emits an escape when a cell is styled.
    const stripped = screen.replace(/[\x1b][[][0-9;]*m/g, "");
    const hasOutput = stripped.trim() !== "" || stripped.length !== screen.length;

    if (!hasOutput) {
      // Keep dead and blank cards in the grid, but show why they are empty.
      const ph = document.createElement("span");
      ph.className = "placeholder";
      if (!alive) {
        ph.textContent =
          typeof t.exit_code === "number"
            ? `· exited (code ${t.exit_code})`
            : "· exited";
      } else {
        ph.textContent = "· no output";
      }
      pre.append(ph);
    } else {
      // Draw the cursor only on a live terminal that is showing it; a dead
      // screen keeps its final frame but no blinking cursor.
      const cursor =
        alive && t.cursor_visible !== false && typeof t.cursor_row === "number"
          ? { row: t.cursor_row, col: t.cursor_col ?? 0, shape: t.cursor_shape ?? "block" }
          : null;
      renderScreen(pre, screen, cursor);
    }

    term.append(head, pre);
    grid.append(term);
  }

  const n = keys.length;
  const p = producers.size;
  stat.textContent =
    `${n} terminal${n === 1 ? "" : "s"}`
    + (p > 1 ? ` · ${p} producers` : "");
}

const es = new EventSource("/events");
es.addEventListener("open", () => {
  dot.classList.add("live");
});
es.addEventListener("error", () => {
  dot.classList.remove("live");
  stat.textContent = "reconnecting…";
});
function ingest(event) {
  doc.import(b64ToBytes(event.data));
  render();
}
es.addEventListener("snapshot", ingest);
es.addEventListener("update", ingest);
</script>
</body>
</html>
