# vmkit: own a guest VM's lifecycle from Rust, one hypervisor backend per host
# and guest OS. macOS guests boot on Apple's Virtualization.framework
# (`objc2-virtualization`). Linux guests boot on libkrun: the EFI/Hypervisor.framework
# variant on a macOS host (`libkrun-efi`), and classic KVM libkrun on a Linux host.
#
# `clap` and `snafu` (the CLI + error types) are unconditional: every host parses
# args and reports errors. The Apple-framework crates stay gated to
# `cfg(target_os = "macos")` (the way the unit graph gates `alsa-sys`, see
# lib/rust/workspace.nix), so a Linux build pulls none of them. The libkrun
# backend is plain FFI over `std::os::raw` (no extra crate); the libkrun library
# itself is linked by the build script (see build.rs) when it is available for
# the build host.
[package]
name = "vmkit"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Own a guest VM's lifecycle from Rust: macOS guests on Virtualization.framework, Linux guests on libkrun"

[[bin]]
name = "vmkit"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
snafu = "0.8"

[target.'cfg(target_os = "macos")'.dependencies]
# gvproxy lifecycle for the libkrun guest NIC (see src/net.rs): a temp dir for
# its unix sockets, and `libc::atexit`/`kill` to tear gvproxy down when
# `krun_start_enter` `exit()`s the process without unwinding.
tempfile = "3"
libc = "0.2"
objc2 = "0.6"
objc2-foundation = "0.3"
objc2-virtualization = "0.3"
block2 = "0.6"
dispatch2 = "0.3"
# macOS-guest boot + off-screen framebuffer screenshot. The guest frame is an
# IOSurface in the VZVirtualMachineView's framebuffer subview's layer; we read
# its BGRA bytes directly and encode PNG with the pure-Rust `image` crate (no
# CoreImage, no window-server capture, no Screen-Recording permission).
objc2-app-kit = "0.3"
objc2-quartz-core = "0.3"
objc2-io-surface = "0.3"
image = { version = "0.25", default-features = false, features = ["png"] }
# `provision` parses `hdiutil`/`diskutil` plist output (converted to JSON with
# `plutil`) to find the guest's APFS Data volume and its mount point. serde lives
# under the macOS gate like everything else here, so the Linux stub graph stays
# dependency-free and the unused-crate-dependencies check passes there.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# The interactive `drive` sessions publish the live guest screen to the local
# dashboard as an image pane. Only the lightweight `Publisher` half of
# `dashboard-core` is used; it pulls the aggregator's deps along until that crate
# is split. tokio runs the publisher socket (this binary otherwise drives an
# AppKit run loop), and base64 builds the frame data URL. All macOS-gated so the
# Linux stub graph stays dependency-free.
dashboard-core = { path = "../dashboard-core" }
tokio = { workspace = true, features = ["rt-multi-thread", "net", "io-util", "sync", "time"] }
base64.workspace = true

[lints]
workspace = true
