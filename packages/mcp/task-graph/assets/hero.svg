<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    svg { color: #1f2328; }
    .muted { fill: #656d76; }
    .node { fill: #8250df; }
    .dim { fill: #656d76; opacity: 0.55; }
    .link { stroke: #656d76; fill: none; }
    text { fill: currentColor; }
    .box { stroke: currentColor; fill: none; }
    .edge { stroke: currentColor; fill: none; marker-end: url(#arrow); }
    @media (prefers-color-scheme: dark) {
      svg { color: #e6edf3; }
      .muted { fill: #8b949e; }
      .node { fill: #a371f7; }
      .dim { fill: #8b949e; }
      .link { stroke: #8b949e; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect class="box" x="25" y="75" width="175" height="70" rx="8"/>
  <text x="112" y="103" text-anchor="middle" font-size="15" font-weight="600">tasks.sqlite</text>
  <text x="112" y="123" text-anchor="middle" font-size="11" class="muted">tasks + deps tables</text>

  <line class="edge" x1="200" y1="110" x2="318" y2="110"/>
  <text x="259" y="100" text-anchor="middle" font-size="12" class="muted">sql.js loads (wasm)</text>

  <line class="link" x1="420" y1="60" x2="500" y2="105"/>
  <line class="link" x1="420" y1="60" x2="390" y2="140"/>
  <line class="link" x1="500" y1="105" x2="390" y2="140"/>
  <line class="link" x1="500" y1="105" x2="590" y2="65"/>
  <line class="link" x1="500" y1="105" x2="610" y2="150"/>
  <line class="link" x1="390" y1="140" x2="470" y2="185"/>

  <circle class="node" cx="420" cy="60" r="11"/>
  <circle class="node" cx="500" cy="105" r="14"/>
  <circle class="dim" cx="390" cy="140" r="10"/>
  <circle class="dim" cx="590" cy="65" r="9"/>
  <circle class="node" cx="610" cy="150" r="10"/>
  <circle class="dim" cx="470" cy="185" r="8"/>

  <text x="500" y="212" text-anchor="middle" font-size="12" class="muted">force-directed DAG, colored by status, faded by hop distance</text>
</svg>
