# Scoped type-checker config for the ENG-3131 strict migration of packages/mcp.
#
# zuban (and mypy) read the `[mypy]` sections here. The build passes this with
# `--config-file` alongside `--strict` on the CLI, so global strictness is
# unchanged -- these per-module sections only relax checks against THIRD-PARTY
# libraries that ship incomplete or missing type information. First-party `ix`
# modules are never relaxed here.
#
# Add a section only for a genuine upstream stub gap, with a one-line reason.

[mypy]

# pygments ships partial stubs: the public re-exports it builds via module
# __getattr__ (HtmlFormatter, TextLexer) and several lexer/highlight helpers are
# untyped, so calling them trips disallow-untyped-calls under --strict. `view`
# imports the canonical submodules for the classes; this clears the helper calls.
[mypy-pygments.*]
disallow_untyped_calls = false
