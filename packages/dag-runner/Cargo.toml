[package]
name = "dag-runner"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive"] }
futures.workspace = true
indicatif.workspace = true
# Used for `libc::kill(pid, SIGTERM)`; tokio::process::Child only exposes the
# SIGKILL escape hatch via `start_kill`, and we want a graceful term first.
libc.workspace = true
progress-style.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["io-util", "macros", "process", "rt", "signal", "sync", "time"] }

[dev-dependencies]
libc.workspace = true
tempfile.workspace = true

# cargo-unit flattens every workspace test target into one namespace, so a
# bare `integration` target collides with git-log-pretty's and clone-detect's
# and gets a non-deterministic `-<version>-<hash>` key. A unique name keeps the
# generated test key stable (`integration_dag_runner-all`).
[[test]]
name = "integration_dag_runner"
path = "tests/integration.rs"
