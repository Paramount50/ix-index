[package]
name = "nix-web-monitor"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Run a Nix build with terminal output and a live web monitor"

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
axum.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
futures.workspace = true
nix-web-monitor-parser.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["io-std", "io-util", "macros", "process", "rt-multi-thread", "signal", "sync"] }
tokio-stream = { workspace = true, features = ["sync"] }
tower-http = { workspace = true, features = ["fs"] }

[dev-dependencies]
tower = { workspace = true, features = ["util"] }
