[package]
name = "nix-web-monitor"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Run a Nix build with terminal output and a live web monitor"

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
axum.workspace = true
bytes.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
nix-web-monitor-parser.workspace = true
rmp-serde.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["io-std", "io-util", "macros", "process", "rt-multi-thread", "signal", "sync"] }
tower-http = { workspace = true, features = ["fs"] }
wtransport.workspace = true

[dev-dependencies]
tower = { workspace = true, features = ["util"] }
