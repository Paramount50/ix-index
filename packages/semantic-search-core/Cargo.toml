[package]
name = "semantic-search-core"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Content-addressed semantic code search core: indexing, manifest, dedup sync, and search, deduplicated across git worktrees"

[lints]
workspace = true

[lib]
name = "semantic_search_core"
path = "src/lib.rs"

[dependencies]
dirs.workspace = true
futures.workspace = true
mixedbread.workspace = true
rayon.workspace = true
repo-walker.workspace = true
rusqlite = { workspace = true, features = ["bundled"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sha2.workspace = true
snafu.workspace = true
tokio = { workspace = true, features = ["fs", "time"] }

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
