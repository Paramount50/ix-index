[project]
name = "system-prompt-eval"
version = "0.1.0"
description = "Behavioral eval registry for the house system prompt"
requires-python = ">=3.13"
dependencies = [
    "anthropic>=0.40.0",
    "pydantic>=2,<3",
]

[project.scripts]
system-prompt-eval = "system_prompt_eval.cli:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
