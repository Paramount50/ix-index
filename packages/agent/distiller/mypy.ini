# Strict type-checking config for ix-distiller (zuban/mypy share this format).
#
# The build runs `zuban check --strict` (see default.nix) and zuban discovers
# this file from the check's working directory. `--strict` supplies every
# correctness flag; the per-module overrides below carve out two dependency
# stub gaps and nothing first-party.
[mypy]

# pyarrow ships py.typed, but its bundled stubs do not mark the top-level
# constructors as explicit re-exports (`pa.schema`, `pa.field`, `pa.string`,
# `pa.int64`, `pa.Table`) and leave the writer/reader helpers (`write_table`,
# `read_schema`) unannotated. Both are upstream-stub limitations, not real
# type errors, so relax only re-export + untyped-call checks for pyarrow.
[mypy-pyarrow]
implicit_reexport = True
disallow_untyped_calls = False

[mypy-pyarrow.*]
implicit_reexport = True
disallow_untyped_calls = False

# boto3 ships only partial stubs: `boto3.client(...)` is untyped in the base
# package (full typing requires the per-service boto3-stubs[s3] extra, which is
# not in the dependency set). Relax untyped-call for the boto3/botocore tree
# only; the distiller's own use of the returned client stays checked.
[mypy-boto3.*]
disallow_untyped_calls = False

[mypy-botocore.*]
disallow_untyped_calls = False
