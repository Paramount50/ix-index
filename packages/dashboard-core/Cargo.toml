[package]
name = "dashboard-core"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Engine-free wire types, a generic pane publisher, and the browser-facing canvas server shared by every dashboard producer"

[lints]
workspace = true

[dependencies]
axum.workspace = true
base64.workspace = true
futures.workspace = true
loro.workspace = true
parking_lot.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
snafu.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "net", "io-util", "time"] }
tokio-stream = { workspace = true, features = ["sync"] }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
serde_json.workspace = true
loro.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util", "time"] }
