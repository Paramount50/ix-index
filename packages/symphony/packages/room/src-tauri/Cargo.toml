# Standalone Cargo workspace for the Tauri shell. Kept separate from
# the top-level symphony workspace because Tauri pins its own
# dependency tree and the desktop app is built out-of-band via
# `npm run tauri:dev` / `tauri:build`, not via Nix.
[workspace]

[package]
name = "room"
version = "0.1.0"
edition = "2024"
description = "Room: desktop client for the team thread viewer"

[lib]
name = "room_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "room"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api"] }
tauri-plugin-opener = "2"
tauri-plugin-deep-link = "2"
# WKWebView on macOS 13-15 caps requestAnimationFrame at 60fps via the
# `PreferPageRenderingUpdatesNear60FPSEnabled` WebKit preference. This
# plugin disables that preference via the private _features API (same
# mechanism Safari uses internally). No-op on Windows / Linux and on
# macOS 26+ where the cap is gone. Private API — not App Store safe.
tauri-plugin-macos-fps = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["io-util", "sync"] }
wtransport = "0.7"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-app-kit = { version = "0.3", features = [
    "NSWindow",
    "NSResponder",
    "NSView",
    "NSButton",
    "NSControl",
    "NSHapticFeedback",
] }
window-vibrancy = "0.6"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
