[workspace]
members = [
  "packages/room-server",
]
# packages/room/src-tauri is its own standalone Cargo workspace
# because the Tauri shell pins its own dep tree.
exclude = [
  "packages/room/src-tauri",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
publish = false

[workspace.dependencies]
anyhow = "1"
axum = "0.8"
clap = "4"
futures = "0.3"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = "1"
serde_json = "1"
tokio = "1"
tower-http = "0.6"
ulid = "1"
