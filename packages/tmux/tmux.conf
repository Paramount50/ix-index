# Modern tmux defaults, baked into the `tmux` package (packages/tmux).
# These are defaults: a personal ~/.config/tmux/tmux.conf is sourced last and
# overrides anything here.

# ── True color ────────────────────────────────────────────────────────
# Without an RGB-capable terminfo, tmux quantizes 24-bit color down to the
# 256-color palette, which is the dull/"washed out" look inside tmux. Use a
# 256-color base term and advertise RGB to the outer terminal (assumed modern).
set -g  default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"      # 24-bit truecolor passthrough
set -as terminal-features ",*:usstyle"  # colored / curly underlines (undercurl)
# Claude Code defensively clamps its own rendering to 256-color whenever $TMUX is
# set (colorize.ts clampChalkLevelForTmux; anthropics/claude-code#36785), ignoring
# COLORTERM/FORCE_COLOR, which dulls its TUI inside tmux. We pass real truecolor
# above, so flip its documented escape hatch on for every pane.
set-environment -g CLAUDE_CODE_TMUX_TRUECOLOR 1

# ── Responsiveness ──────────────────────────────────────────────────────
set -sg escape-time 10   # don't treat a lone <Esc> as a key prefix (nvim lag)
set -g  focus-events on  # forward focus in/out so nvim autoread etc. fire
set -g  repeat-time 600

# ── Comfort ─────────────────────────────────────────────────────────────
set -g  mouse on
set -g  history-limit 50000
set -g  set-clipboard on    # OSC 52: copy-mode yanks reach the system clipboard
set -g  base-index 1        # windows count from 1
setw -g pane-base-index 1
set -g  renumber-windows on # keep window numbers gapless after one closes
setw -g mode-keys vi
set -g  allow-passthrough on # let inner programs emit raw escapes (image protocols)

# ── Layer the user's own config on top, if present ─────────────────────
source-file -q ~/.config/tmux/tmux.conf
source-file -q ~/.tmux.conf
