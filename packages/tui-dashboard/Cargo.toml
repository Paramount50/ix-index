[package]
name = "tui-dashboard"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Standalone web dashboard that aggregates every ix tui producer socket into one live grid"

[lints]
workspace = true

[[bin]]
name = "tui-dashboard"
path = "src/main.rs"

[dependencies]
clap = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util", "time", "signal"] }
tui-dashboard-core.workspace = true
