[package]
name = "nix-cargo-unit"
version.workspace = true
edition.workspace = true
description = "Render Cargo unit graphs as composable Nix derivations"
license = "MIT"
publish.workspace = true

[dependencies]
askama = { workspace = true, default-features = false, features = ["derive", "std"] }
clap = { workspace = true, features = ["derive"] }
color-eyre.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sha2.workspace = true
toml = { workspace = true, default-features = false, features = ["parse", "serde"] }
url = { workspace = true, default-features = false }
