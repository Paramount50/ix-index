# Empty `[workspace]` makes this crate its own workspace root so it stays off
# the repo's top-level `cargo --workspace` graph (same trick the fuzz crates
# use). The app is a standalone Tauri build, not part of the Nix/Cargo
# discovery surface; nothing in this repo depends on it.
[workspace]

[package]
name = "bossbar-overlay"
version = "0.1.0"
description = "Minecraft-style boss bar desktop overlay driven by an SQLite file"
authors = ["Andrew Gazelka"]
edition = "2021"

[lib]
# The `_lib` suffix keeps the lib name distinct from the bin name on Windows.
# See https://github.com/rust-lang/cargo/issues/8519
name = "bossbar_overlay_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "macos-private-api"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Bundled SQLite so users don't need a system libsqlite3.
rusqlite = { version = "0.32", features = ["bundled"] }
dirs = "5"
