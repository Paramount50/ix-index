[package]
name = "dashboard"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Standalone web canvas that aggregates every ix resource producer socket into one live, replayable board"

[lints]
workspace = true

[[bin]]
name = "dashboard"
path = "src/main.rs"

[dependencies]
clap = { workspace = true, features = ["derive"] }
dashboard-core.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util", "time", "signal"] }
