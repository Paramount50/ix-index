<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    svg { color: #1f2328; }
    .muted { fill: #656d76; }
    .accent { stroke: #8250df; }
    text { fill: currentColor; }
    .box { stroke: currentColor; fill: none; }
    .edge { stroke: currentColor; fill: none; marker-end: url(#arrow); }
    @media (prefers-color-scheme: dark) {
      svg { color: #e6edf3; }
      .muted { fill: #8b949e; }
      .accent { stroke: #a371f7; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect class="box" x="20" y="78" width="175" height="64" rx="8"/>
  <text x="107" y="105" text-anchor="middle" font-size="15" font-weight="600">@indexable/sdk</text>
  <text x="107" y="124" text-anchor="middle" font-size="11" class="muted">Sandbox, Client, Branch</text>

  <line class="edge" x1="195" y1="95" x2="288" y2="52"/>
  <line class="edge" x1="195" y1="125" x2="288" y2="168"/>
  <text x="240" y="60" text-anchor="middle" font-size="12" class="muted">loads</text>
  <text x="240" y="172" text-anchor="middle" font-size="12" class="muted">loads</text>

  <rect class="box" x="290" y="20" width="190" height="60" rx="8"/>
  <text x="385" y="45" text-anchor="middle" font-size="14" font-weight="600">Node / Bun</text>
  <text x="385" y="64" text-anchor="middle" font-size="11" class="muted">native N-API binding</text>

  <rect class="box" x="290" y="140" width="190" height="60" rx="8"/>
  <text x="385" y="165" text-anchor="middle" font-size="14" font-weight="600">browser</text>
  <text x="385" y="184" text-anchor="middle" font-size="11" class="muted">wasm + WebTransport</text>

  <line class="edge" x1="480" y1="50" x2="573" y2="95"/>
  <line class="edge" x1="480" y1="170" x2="573" y2="125"/>
  <text x="530" y="105" text-anchor="middle" font-size="12" class="muted">drives</text>

  <rect class="box accent" x="575" y="78" width="125" height="64" rx="8"/>
  <text x="637" y="105" text-anchor="middle" font-size="15" font-weight="600">ix VMs</text>
  <text x="637" y="124" text-anchor="middle" font-size="11" class="muted">api.ix.dev</text>
</svg>
