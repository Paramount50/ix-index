<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    svg { color: #1f2328; }
    .muted { fill: #656d76; }
    .accent { stroke: #8250df; }
    text { fill: currentColor; }
    .box { stroke: currentColor; fill: none; }
    .edge { stroke: currentColor; fill: none; marker-end: url(#arrow); }
    @media (prefers-color-scheme: dark) {
      svg { color: #e6edf3; }
      .muted { fill: #8b949e; }
      .accent { stroke: #a371f7; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect class="box" x="20" y="20" width="150" height="46" rx="8"/>
  <text x="95" y="48" text-anchor="middle" font-size="14" font-weight="600">Rust</text>

  <rect class="box" x="20" y="87" width="150" height="46" rx="8"/>
  <text x="95" y="115" text-anchor="middle" font-size="14" font-weight="600">Python</text>

  <rect class="box" x="20" y="154" width="150" height="46" rx="8"/>
  <text x="95" y="182" text-anchor="middle" font-size="14" font-weight="600">TypeScript</text>

  <line class="edge" x1="170" y1="43" x2="288" y2="95"/>
  <line class="edge" x1="170" y1="110" x2="288" y2="110"/>
  <line class="edge" x1="170" y1="177" x2="288" y2="125"/>
  <text x="229" y="88" text-anchor="middle" font-size="12" class="muted">links</text>

  <rect class="box accent" x="290" y="78" width="180" height="64" rx="8"/>
  <text x="380" y="105" text-anchor="middle" font-size="15" font-weight="600">ix-sdk core</text>
  <text x="380" y="124" text-anchor="middle" font-size="11" class="muted">precompiled, proprietary</text>

  <line class="edge" x1="470" y1="110" x2="548" y2="110"/>
  <text x="509" y="100" text-anchor="middle" font-size="12" class="muted">calls</text>

  <rect class="box" x="550" y="78" width="150" height="64" rx="8"/>
  <text x="625" y="105" text-anchor="middle" font-size="15" font-weight="600">hosted ix</text>
  <text x="625" y="124" text-anchor="middle" font-size="11" class="muted">api.ix.dev, VMs</text>
</svg>
