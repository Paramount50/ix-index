[package]
name = "flecs-query-mcp"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "ix-flecs-query-mcp: a stdio MCP server exposing the flecs-query-core parser (parse, canonicalize, validate)"

[lints]
workspace = true

[[bin]]
name = "ix-flecs-query-mcp"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
flecs-query-core = { workspace = true, features = ["serde"] }
rmcp = { version = "2.0", default-features = false, features = ["server", "macros", "transport-io"] }
schemars = "1"
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "io-std"] }
