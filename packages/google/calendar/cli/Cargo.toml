[package]
name = "google-calendar-cli"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "gcal: Google Calendar from the shell (thin wrapper over the google-calendar crate)"

[lints]
workspace = true

[[bin]]
name = "gcal"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
chrono = { workspace = true, features = ["clock"] }
clap = { workspace = true, features = ["derive"] }
google-calendar.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["io-std", "io-util", "macros", "rt-multi-thread"] }
