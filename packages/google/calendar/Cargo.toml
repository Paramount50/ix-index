[package]
name = "google-calendar"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Typed Google Calendar v3 client: installed-app OAuth (PKCE) plus event list/get/create/cancel"

[lints]
workspace = true

[lib]
name = "google_calendar"
path = "src/lib.rs"

[dependencies]
base64.workspace = true
# `alloc` carries the RFC 3339 formatters (`to_rfc3339`) under the
# workspace's default-features = false chrono.
chrono = { workspace = true, features = ["alloc", "serde"] }
dirs.workspace = true
reqwest.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sha2.workspace = true
snafu.workspace = true
tokio = { workspace = true, features = ["io-util", "net", "sync"] }
url.workspace = true
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
axum.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
