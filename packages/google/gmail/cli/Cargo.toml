[package]
name = "google-gmail-cli"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "gmail: Google Gmail from the shell (thin wrapper over the google-gmail crate)"

[lints]
workspace = true

[[bin]]
name = "gmail"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
base64.workspace = true
clap = { workspace = true, features = ["derive"] }
google-gmail.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["fs", "io-std", "io-util", "macros", "rt-multi-thread"] }
