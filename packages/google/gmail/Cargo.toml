[package]
name = "google-gmail"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Typed Google Gmail v1 client: messages, threads, labels, drafts, send, attachments on top of the shared google-auth OAuth flow"

[lints]
workspace = true

[lib]
name = "google_gmail"
path = "src/lib.rs"

[dependencies]
base64.workspace = true
bytes.workspace = true
chrono = { workspace = true, features = ["alloc", "serde"] }
google-auth.workspace = true
reqwest.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
snafu.workspace = true
url.workspace = true
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
axum.workspace = true
google-auth.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
