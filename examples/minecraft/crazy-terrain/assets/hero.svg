<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    svg { color: #1f2328; }
    text { fill: currentColor; }
