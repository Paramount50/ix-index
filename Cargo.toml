[workspace]
members = [
  "modules/services/resource-monitor/stats-writer",
  "packages/agents-md",
  "packages/code-highlight",
  "packages/code-tokenizer",
  "packages/dag-runner",
  "packages/file-search",
  "packages/ix-dev-diagnose",
  "packages/mcp",
  "packages/minecraft/nbt",
  "packages/minecraft/sound",
  "packages/minecraft/sync-managed",
  "packages/mixedbread",
  "packages/nix-cargo-unit",
  "packages/nix-web-monitor/parser",
  "packages/nix-web-monitor/server",
  "packages/oci-image-builder",
  "packages/repo-walker",
  "packages/semantic-search",
  "packages/semantic-search-core",
  "packages/semantic-search-py",
  "packages/tap",
  "packages/tap/protocol",
  "packages/tap/pty",
  "packages/tui",
  "packages/tui-dashboard",
  "packages/tui-dashboard-core",
  "packages/tui-node",
  "packages/tui-py",
  "packages/vt/ix-vt",
  "packages/vt/ix-vt-sys",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
publish = false

[workspace.lints.rust]
warnings = "deny"

[workspace.lints.clippy]
# Group lints need priority below per-lint overrides so allowlist entries
# (such as `multiple_crate_versions`) can opt out without disabling the group.
# Cargo emits `lint_groups_priority` errors otherwise.
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
cargo = { level = "deny", priority = -1 }
multiple_crate_versions = "allow"

[workspace.dependencies]
anstream = "1"
anstyle = "1"
anyhow = "1"
askama = { version = "0.16.0", default-features = false }
axum = "0.8"
base64 = "0.22"
bytes = "1"
chrono = { version = "0.4", default-features = false }
clap = "4"
code-highlight = { path = "packages/code-highlight" }
code-tokenizer = { path = "packages/code-tokenizer" }
color-eyre = "0.6"
dirs = "5"
futures = "0.3"
hegeltest = { version = "0.14", default-features = false }
ignore = "0.4"
indicatif = "0.18"
libc = "0.2"
mixedbread = { path = "packages/mixedbread" }
loro = "1.12"
napi = { version = "3", default-features = false, features = ["napi6", "tokio_rt"] }
napi-build = "2"
napi-derive = "3"
ndarray = "0.16"
nix = "0.30"
nix-web-monitor-parser = { path = "packages/nix-web-monitor/parser" }
numpy = "0.28"
object = { version = "0.37", default-features = false, features = [
  "read",
  "write",
  "std",
] }
parking_lot = "0.12"
pty-process = { version = "0.4", features = ["async"] }
pyo3 = { version = "0.28", features = ["abi3-py311"] }
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
quartz_nbt = "0.2.9"
rayon = "1"
repo-walker = { path = "packages/repo-walker" }
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls",
  "multipart",
] }
rmcp = "1.7"
rmp-serde = "1"
rodio = { version = "0.19", default-features = false, features = ["vorbis"] }
rusqlite = { version = "0.32", features = ["bundled"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
rustls-native-certs = "0.8"
schemars = "1"
semantic-search-core = { path = "packages/semantic-search-core" }
serde = "1"
serde_json = "1"
sha2 = "0.10"
similar = "2"
snafu = "0.9"
strip-ansi-escapes = "0.2"
tango-bench = "0.7"
tantivy = "0.26"
tap-protocol = { path = "packages/tap/protocol" }
tap-pty = { path = "packages/tap/pty" }
tar = "0.4"
tempfile = "3"
tokio = "1"
tokio-stream = "0.1"
toml = { version = "1.1.2", default-features = false }
tower = "0.5"
tower-http = "0.6"
tree-sitter = "0.26"
tree-sitter-bash = "0.25"
tree-sitter-c = "0.24"
tree-sitter-c-sharp = "0.23"
tree-sitter-cpp = "0.23"
tree-sitter-css = "0.25"
tree-sitter-elixir = "0.3"
tree-sitter-go = "0.25"
tree-sitter-haskell = "0.23"
tree-sitter-highlight = "0.26"
tree-sitter-html = "0.23"
tree-sitter-java = "0.23"
tree-sitter-javascript = "0.25"
tree-sitter-json = "0.24"
tree-sitter-lua = "0.5"
tree-sitter-md = "0.5"
tree-sitter-nix = "0.3"
tree-sitter-ocaml = "0.25"
tree-sitter-php = "0.24"
tree-sitter-python = "0.25"
tree-sitter-ruby = "0.23"
tree-sitter-rust = "0.24"
tree-sitter-scala = "0.26"
tree-sitter-sequel = "0.3"
tree-sitter-swift = "0.7"
tree-sitter-toml-ng = "0.7"
tree-sitter-typescript = "0.23"
tree-sitter-yaml = "0.7"
tui = { path = "packages/tui" }
tui-dashboard-core = { path = "packages/tui-dashboard-core" }
url = { version = "2.5.8", default-features = false }
uuid = "1"
vt100 = "0.16"
webpki-roots = "1"
wtransport = "0.7"
x509-parser = "0.18"
