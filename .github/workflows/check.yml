name: Check

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@bafaa638b9d5ec0e7e3ac1a7fc80453ef1fd265f # v3
        with:
          # `accept-flake-config` lets CI consume the flake's `nixConfig`
          # (the Cachix substituter) without an interactive prompt.
          extra-conf: |
            accept-flake-config = true

      # Configures the indexable-inc Cachix substituter for the daemon and
      # uploads every store path realised during this job. PRs from forks
      # cannot read `secrets.CACHIX_AUTH_TOKEN` so the action degrades to
      # read-only automatically. Push-event jobs from main and release tags
      # supply the token and become writers; this gates publish credentials on
      # reviewed refs per the supply-chain rule in AGENTS.md.
      - name: Set up Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: indexable-inc
          authToken: ${{ github.event_name == 'push' && secrets.CACHIX_AUTH_TOKEN || '' }}

      - name: nix flake check
        run: nix flake check -L
