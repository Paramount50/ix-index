name: Update content

on:
  workflow_dispatch:
  schedule:
    # One updater for every content source in the repo: the Minecraft mod /
    # loader / sound catalogs and the pinned prebuilt binaries (claude-code,
    # yc, ...). `nix run .#update` runs them all in parallel and the set is
    # discovered from the registry, so adding a package with an updateScript
    # needs no change here. claude-code promotes builds several times a week, so
    # check hourly to advance the open PR within the hour. A no-op run is a
    # cache hit and the updater reuses one branch, so this stays cheap and
    # never stacks PRs. flake.lock is updated by its own reusable workflow
    # (update-flake-lock.yml), not here.
    - cron: "37 * * * *"

permissions:
  contents: read

concurrency:
  group: update-content
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # `accept-flake-config` lets the job consume the flake's cache.ix.dev
      # substituter without a prompt.
      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3
        with:
          # Read-only: the updater only needs warm substitutes to verify a freshly
          # pinned hash builds. Publishing happens when the resulting PR merges and
          # flake-check rebuilds on the self-hosted runners (which push to ix-ci).
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://cache.ix.dev
            extra-trusted-public-keys = ix-workspace:JuAaeOPfR3GL3nUICpEz/88/+S3BzGF3L6bPYFy0GwI=

      # Runs every content updater in parallel via dag-runner (see
      # lib/per-system.nix). Each regenerates its own source files relative to
      # the repo root: the Minecraft catalogs/sound pack, and each pinned
      # package's packages/<id>/manifest.json.
      #
      # `|| true`: a content updater talks to an independent upstream (papermc,
      # fabric, mojang, the yc/claude-code release hosts). One flaky upstream
      # must not discard the bumps the others already wrote, so a failed node
      # does not abort the job. This is safe because each updater is itself
      # fail-closed at the point it writes: claude-code verifies Anthropic's
      # detached GPG signature before writing its manifest, and the "Build
      # changed packages" step below rejects any manifest whose pinned hash does
      # not fetch. dag-runner still prints which nodes failed.
      - name: Run updaters
        run: nix run .#update || true

      # Build every changed package's x86_64-linux output. This proves the
      # freshly pinned hash actually fetches and the package builds; it does NOT
      # prove provenance. claude-code's updater already verified a GPG signature
      # over all four platform checksums, but yc has no upstream signature and
      # this step only builds the runner's platform, so for yc the four hash
      # changes in the diff are trusted on the strength of human PR review, not a
      # cryptographic check. Catalog updaters are validated by the PR's own
      # flake-check CI. Assumes a package's directory name equals its flake attr
      # (its registry `id`), which holds for every flagged package today.
      - name: Build changed packages
        run: |
          set -euo pipefail
          changed=$(git diff --name-only -- 'packages/*/manifest.json' || true)
          if [ -z "$changed" ]; then
            echo "no package manifests changed"
            exit 0
          fi
          for manifest in $changed; do
            id=$(basename "$(dirname "$manifest")")
            echo "::group::nix build .#$id"
            nix build ".#$id"
            echo "::endgroup::"
          done

      # Opens (or updates) a single PR with all refreshed content, and only when
      # something changed: create-pull-request no-ops on an empty diff. It
      # reuses the `update-content` branch so each run advances the same PR.
      #
      # `token`: a PR opened with the default GITHUB_TOKEN does not trigger the
      # `pull_request` workflows (`flake-check`), so branch protection would
      # block the merge. Set an `AUTOBUMP_TOKEN` repo secret (a PAT or GitHub
      # App token) to make the PR run CI; without it this falls back to
      # GITHUB_TOKEN and a maintainer must re-trigger `flake-check`.
      - name: Open pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.AUTOBUMP_TOKEN || github.token }}
          base: main
          branch: update-content
          delete-branch: true
          commit-message: "content: refresh catalogs and pinned versions"
          title: "content: refresh catalogs and pinned versions"
          body: |
            Automated refresh of every repo content source.

            `nix run .#update` ran all content updaters in parallel: the Minecraft mod / loader / sound catalogs and every package whose `package.nix` sets `updateScript = true` (currently claude-code and yc). flake.lock is handled by its own workflow.

            Each changed package also built on `x86_64-linux`, which proves the new hash fetches and builds but **not** that it is authentic. claude-code's updater verified Anthropic's detached GPG signature over all four platform checksums before writing. **yc has no upstream signature**, so please eyeball the yc hash changes before merging: the build only covers x86_64-linux, and the updater pins whatever bytes the release host served.

            Auto-bump, made with Claude Opus 4.8.
