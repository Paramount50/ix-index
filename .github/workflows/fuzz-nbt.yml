name: Fuzz minecraft-nbt

on:
  pull_request:
    paths:
      - "packages/minecraft/minecraft/nbt/**"
      - ".github/workflows/fuzz-nbt.yml"
      - "rust-toolchain.toml"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: read

concurrency:
  group: fuzz-nbt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Pin the cargo-fuzz version so a crates.io release cannot change the gate
      # silently. `--locked` is incompatible with the toolchain because
      # cargo-fuzz 0.13.1's lockfile pins an old `rustix` that no longer
      # compiles, so resolve the install's own deps unlocked.
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.1

      - name: Fuzz decode_document for 60 seconds
        working-directory: packages/minecraft/minecraft/nbt/fuzz
        run: |
          cargo fetch --locked
          mkdir -p corpus/decode_document
          cp seeds/decode_document/* corpus/decode_document/
          cargo fuzz run decode_document -- -max_total_time=60 -timeout=10
