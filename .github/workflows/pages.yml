name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Determinate Nix
        uses: ./.github/actions/install-nix

      - name: Build site
        run: nix build .#site -L

      # The site's closure is published to cache.ix.dev by the dedicated
      # cache-push.yml workflow (which pushes the full `packages.x86_64-linux`
      # build closure, a superset of this site's runtime closure), so Pages no
      # longer pushes to the cache itself. See indexable-inc/index#1639.
      - name: Prepare Pages artifact
        run: |
          mkdir -p site-dist
          cp -R result/share/ix-site/. site-dist/
          touch site-dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
