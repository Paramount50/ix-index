name: Repo metadata

on:
  workflow_dispatch:
  # `metadata-check` runs on every PR (no `paths` filter, so it can be added
  # to branch protection as a required status without stranding PRs that
  # don't touch metadata) and in the merge queue.
  pull_request:
    branches:
      - main
  merge_group:
  push:
    branches:
      - main
  schedule:
    # Daily safety net: GitHub About-sidebar edits made out-of-band in the UI
    # converge back to the declared state even when nothing was pushed. The
    # sync writes only when live values differ, so a quiet day is a no-op.
    # Minute offset from the other crons so they never start together.
    - cron: "43 6 * * *"

permissions:
  contents: read

concurrency:
  group: repo-metadata-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Render `.#lib.repoMetadata` (the monorepo entry in lib/repo-metadata.nix
  # plus one entry per package mirror) and validate it. The eval itself
  # throws when a mirror-enabled package is missing `mirror.description` or
  # `mirror.topics` (packages/registry.nix), and the script re-checks the
  # rendered JSON plus README presence, so a PR cannot land a covered repo
  # that would show "No description, website, or topics provided."
  metadata-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Determinate Nix
        uses: ./.github/actions/install-nix

      - name: Check declared repo metadata
        run: |
          set -euo pipefail
          nix eval --json '.#lib.repoMetadata' > /tmp/repo-metadata.json
          .github/scripts/repo-metadata.sh check /tmp/repo-metadata.json

  # Sync the declared metadata to GitHub on pushes to main (plus the daily
  # cron and workflow_dispatch). Editing a repo's description/homepage/topics
  # needs repository Administration: write, which the default GITHUB_TOKEN
  # never has, so the job mints a short-lived token from the org-owned
  # ix-mirror-sync GitHub App -- the same app mirror-sync.yml uses (see
  # packages/mirror/README.md, "Permissions"). When the app secrets are
  # absent the job skips loudly instead of half-running.
  metadata-sync:
    if: ${{ github.event_name != 'pull_request' && github.event_name != 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Determinate Nix
        uses: ./.github/actions/install-nix

      - name: Mint metadata token
        id: metadata-token
        if: ${{ vars.MIRROR_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.MIRROR_APP_CLIENT_ID }}
          private-key: ${{ secrets.MIRROR_APP_PRIVATE_KEY }}
          owner: indexable-inc

      - name: Sync repo metadata to GitHub
        env:
          GH_TOKEN: ${{ steps.metadata-token.outputs.token }}
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN is not configured; skipping metadata sync." \
                 "See packages/mirror/README.md (Permissions)."
            exit 0
          fi
          nix eval --json '.#lib.repoMetadata' > /tmp/repo-metadata.json
          .github/scripts/repo-metadata.sh sync /tmp/repo-metadata.json
