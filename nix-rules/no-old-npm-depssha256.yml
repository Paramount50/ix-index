id: no-old-npm-depssha256
language: nix
severity: error
message: "`npmDepsSha256` was removed from `buildNpmPackage`. Use `npmDepsHash = \"sha256-...=\";` (SRI)."
note: |
  WHY: Legacy `buildNpmPackage` accepted bare `sha256`/`npmDepsSha256` in some
  forks; nixpkgs only takes `npmDepsHash` now. Hand-typed `sha256 = ...;` next
  to a `pname/version`/`src` block silently ships a derivation with the wrong
  fetched closure.
  REPO: Use `npmDepsHash` with SRI. The pnpm-build equivalent is
  `pnpmDeps.hash` / `pnpmDepsHash` (current name — do not flag).
rule:
  # Match the binding by attrpath; the old `npmDepsSha256 = $_` never parsed.
  kind: binding
  has:
    field: attrpath
    regex: '^npmDepsSha256$'
