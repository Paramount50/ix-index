id: no-stringly-flags
language: nix
severity: error
message: "Build flag attrs are list-of-string, not one string with spaces. Whitespace inside flag values breaks paths-with-spaces and shell quoting."
note: |
  WHY: `configureFlags`, `cmakeFlags`, `mesonFlags`, `makeFlags`, `ninjaFlags`,
  and `xorgserverFlags` are all list-shaped in stdenv. Passing a single
  whitespace-joined string means stdenv splits on bare whitespace and any path
  containing a space (`/nix/store/.../Application Support/...`) silently breaks
  into multiple flags. nixpkgs-hammering catches this exact bug.
  NIXPKGS: nixpkgs-hammering `no-flags-array`.
  REPO: Pass a Nix list. Use `lib.optional` / `lib.optionals` for conditional
  flags so each flag is its own element.
rule:
  # Match the binding directly: a flag attr whose value is a single string
  # literal. The old `configureFlags = "$_"` patterns never parsed as bindings.
  kind: binding
  all:
    - has:
        field: attrpath
        regex: '^(configureFlags|cmakeFlags|mesonFlags|makeFlags|ninjaFlags|xorgserverFlags)$'
    - has:
        field: expression
        kind: string_expression
