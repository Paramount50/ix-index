id: no-pname-finalattrs-self-ref
language: nix
severity: warning
message: "`finalAttrs.pname` as the value of `repo`, `owner`, or `pname` itself is usually a copy-paste artifact. Use the literal."
note: |
  WHY: Inside `fetchFromGitHub { owner = finalAttrs.pname repo = finalAttrs.pname rev = ...; }`,
  the self-reference is only valuable if you actually need the indirection — and
  `repo = finalAttrs.pname` is almost never that case, since the repo name on
  the forge rarely matches the nixpkgs `pname` exactly. Same shape for `owner`.
  NIXPKGS: Tracking issue #277994.
  REPO: Use the literal string. Save `finalAttrs.*` self-reference for values that
  must move with overrides (like `version` inside `src.url`).
rule:
  # `repo = finalAttrs.pname` parses as a binding only inside an attrset context.
  any:
    - pattern:
        context: '{ repo = finalAttrs.pname; }'
        selector: binding
    - pattern:
        context: '{ owner = finalAttrs.pname; }'
        selector: binding
    - pattern:
        context: '{ pname = finalAttrs.pname; }'
        selector: binding
