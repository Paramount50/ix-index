id: no-substitute-all
language: nix
severity: error
message: "`substituteAll` / `substituteAllFiles` was removed from nixpkgs. Use `replaceVars` or `replaceVarsWith` instead."
note: |
  WHY: `substituteAll` silently coerced everything into stringly args and was a
  long-standing footgun (issue #237216). nixpkgs removed it (PR #301350) and
  shipped `replaceVars` / `replaceVarsWith` as typed replacements that fail loudly
  when a placeholder is missing.
  NIXPKGS: Yes — `substituteAll` is gone from nixpkgs unstable. `pkgs.substituteAll`
  and the bare `substituteAll` callable inside `mkDerivation` builders are both
  removed.
  REPO: Use `pkgs.replaceVars ./template.patch { inherit foo bar; }` (or
  `pkgs.replaceVarsWith` for the file-list form).
rule:
  any:
    - pattern: pkgs.substituteAll $$$X
    - pattern: pkgs.substituteAllFiles $$$X
    - pattern: substituteAll { $$$ATTRS }
    - pattern: substituteAllFiles { $$$ATTRS }
