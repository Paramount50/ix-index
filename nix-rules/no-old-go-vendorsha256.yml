id: no-old-go-vendorsha256
language: nix
severity: error
message: "`vendorSha256` is removed from `buildGoModule`. Use `vendorHash` (SRI)."
note: |
  WHY: Same rename as the Rust side. nixpkgs renamed `vendorSha256` → `vendorHash`
  and removed the legacy slot; setting it now is a silent no-op.
  NIXPKGS: Removed alongside the SRI migration.
  REPO: Use `vendorHash = "sha256-...=";`. Set `vendorHash = null;` for vendored
  modules.
rule:
  pattern: vendorSha256 = $_
