id: prefer-genattrs-mapattrs-identity
language: nix
severity: warning
message: "`lib.mapAttrs (_: _: v) X` discards both name and value. Use `lib.genAttrs (lib.attrNames X) (_: v)` when the value is constant, or `builtins.mapAttrs (_: f) X` when only the value matters."
note: |
  WHY: Discarding both lambda arguments inside `mapAttrs` is a smell — either
  the function is keyed on something external (use `genAttrs`) or the value is
  truly constant (use `genAttrs` with a literal). Reading `_: _:` at the call
  site makes the intent ambiguous.
  REPO: Use `lib.genAttrs` for "keys with constant value" and `lib.mapAttrs (_: f)`
  for "transform values, keep names."
rule:
  any:
    - pattern: 'lib.mapAttrs (_: _: $V) $X'
    - pattern: 'lib.mapAttrs ($_: $_: $V) $X'
    - pattern: 'mapAttrs (_: _: $V) $X'
    - pattern: 'mapAttrs ($_: $_: $V) $X'
