id: prefer-lib-optional-singleton
language: nix
severity: warning
message: "`lib.optionals cond [ x ]` collapses to `lib.optional cond x`."
note: |
  WHY: `lib.optional` (singular) takes one item; `lib.optionals` (plural) takes a
  list. Wrapping a single element in `[ ]` and handing it to the plural variant
  reads as accidental and is harder to grep.
  NIXPKGS: Convention across nixpkgs services modules.
  REPO: Use `lib.optional cond x` when the conditional yields one element.
rule:
  any:
    - pattern: lib.optionals $COND [ $ITEM ]
    - pattern: optionals $COND [ $ITEM ]
