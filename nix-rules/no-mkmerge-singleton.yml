id: no-mkmerge-singleton
language: nix
severity: warning
message: "`mkMerge [ x ]` is identity. Drop the wrapper."
note: |
  WHY: A single-element `mkMerge` adds no merge work and obscures intent. If the
  list will grow later, leave a comment naming the planned merge sources; without
  one, the wrapper reads as accidental.
  REPO: Replace `lib.mkMerge [ expr ]` with `expr` (or `(expr)` if the parent
  context needs grouping).
rule:
  any:
    - pattern: lib.mkMerge [ $X ]
    - pattern: mkMerge [ $X ]
