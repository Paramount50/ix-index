id: no-double-paren-attr
language: nix
severity: warning
message: "`(($X))` is double-grouped. Drop one layer of parens."
note: |
  WHY: Nested parentheses around the same expression read as a refactor
  leftover. statix `useless_parens` catches the simple version; double-paren
  is the case that survives the first pass.
  REPO: One layer of parens is enough.
rule:
  pattern: (($X))
