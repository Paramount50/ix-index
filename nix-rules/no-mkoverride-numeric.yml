id: no-mkoverride-numeric
language: nix
severity: error
message: "`mkOverride <literal>` is the back-door for `mkForce`. Use module priority composition (`mkDefault`, `mkOptionDefault`, `mkBefore`, `mkAfter`) or fix the module boundary."
note: |
  WHY: `mkForce` is banned in this repo (`no-mkforce`). `mkOverride 50` (or any
  small numeric literal) is the same hammer wearing a hat — it bypasses the
  priority lattice rather than composing with it. The fix is the same: own the
  option at the right module, or use the named priority helpers.
  NIXPKGS: `mkOverride` exists for the module system internals; hand-written
  numeric priorities are flagged by reviewers across nixpkgs.
  REPO: Use `mkDefault` (priority 1000), `mkOptionDefault` (priority 1500), or
  `mkBefore` / `mkAfter` for list-shaped options.
rule:
  any:
    - pattern: lib.mkOverride $N
    - pattern: mkOverride $N
constraints:
  N:
    regex: '^[0-9]+$'
